name: Build Module

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android build tools
        run: |
          BUILD_TOOLS=$(find "$ANDROID_HOME/build-tools" -maxdepth 1 -mindepth 1 -type d | sort -V | tail -1)
          echo "BUILD_TOOLS_DIR=$BUILD_TOOLS" >> "$GITHUB_ENV"
          ANDROID_JAR=$(find "$ANDROID_HOME/platforms" -maxdepth 2 -name "android.jar" | sort -V | tail -1)
          echo "ANDROID_JAR=$ANDROID_JAR" >> "$GITHUB_ENV"

      - name: Read version
        id: version
        run: |
          VERSION=$(grep "^version=" module/module.prop | cut -d= -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > krugdev.jks

      - name: Build APKs
        env:
          KS_PASSWORD: ${{ secrets.KS_PASSWORD }}
        run: |
          mkdir -p out
          for VARIANT in dark light; do
            echo "=== Building $VARIANT ==="

            "$BUILD_TOOLS_DIR/aapt2" compile \
              --dir "src/$VARIANT/res" \
              -o "out/compiled_$VARIANT.flata"

            "$BUILD_TOOLS_DIR/aapt2" link \
              --manifest "src/$VARIANT/AndroidManifest.xml" \
              -I "$ANDROID_JAR" \
              -o "out/${VARIANT}_unaligned.apk" \
              "out/compiled_$VARIANT.flata"
            rm "out/compiled_$VARIANT.flata"

            "$BUILD_TOOLS_DIR/zipalign" -p 4 \
              "out/${VARIANT}_unaligned.apk" \
              "out/${VARIANT}_aligned.apk"
            rm "out/${VARIANT}_unaligned.apk"

            java -jar tools/apksigner.jar sign \
              --ks krugdev.jks \
              --ks-pass "env:KS_PASSWORD" \
              --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
              --out "out/$VARIANT.apk" \
              "out/${VARIANT}_aligned.apk"
            rm "out/${VARIANT}_aligned.apk"
            rm -f "out/$VARIANT.apk.idsig"

            echo "=== $VARIANT done ==="
          done

      - name: Clean up keystore
        if: always()
        run: rm -f krugdev.jks

      - name: Verify APKs
        run: |
          java -jar tools/apksigner.jar verify -v out/dark.apk
          java -jar tools/apksigner.jar verify -v out/light.apk

      - name: Copy APKs into module
        run: |
          mkdir -p module/common
          cp out/dark.apk  module/common/DarkCursor.apk
          cp out/light.apk module/common/LightCursor.apk

      - name: Package module zip
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd module && zip -r9 "../out/SPenCursorOverlay-${VERSION}.zip" . && cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SPenCursorOverlay-${{ steps.version.outputs.version }}
          path: out/SPenCursorOverlay-${{ steps.version.outputs.version }}.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/SPenCursorOverlay-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
